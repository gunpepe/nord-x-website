[build]
  publish = "."

# ── .html を含むURLはクリーンURLにリダイレクト ──────────────────────
[[redirects]]
  from = "/services.html"
  to   = "/services"
  status = 301

[[redirects]]
  from = "/company.html"
  to   = "/company"
  status = 301

[[redirects]]
  from = "/news.html"
  to   = "/news"
  status = 301

[[redirects]]
  from = "/careers.html"
  to   = "/careers"
  status = 301

[[redirects]]
  from = "/contact.html"
  to   = "/contact"
  status = 301

# ── クリーンURLから実ファイルへのリライト ────────────────────────────
[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/company"
  to   = "/company.html"
  status = 200

[[redirects]]
  from = "/news"
  to   = "/news.html"
  status = 200

[[redirects]]
  from = "/careers"
  to   = "/careers.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200
